name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-napi:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
            suffix: darwin-arm64
          - target: x86_64-apple-darwin
            runner: macos-latest
            suffix: darwin-x64
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            suffix: linux-x64-gnu
            flags: "--use-napi-cross"
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            suffix: linux-arm64-gnu
            flags: "--use-napi-cross"
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            suffix: win32-x64-msvc
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Read sia-sdk-rs napi version
        id: sdk
        shell: bash
        # This job clones only the napi crate's tag. build-wasm clones the
        # wasm tag independently. They produce a coherent npm artifact only
        # because upstream tags both crates at the same commit (see
        # check-sdk-update.yml header).
        run: echo "ref=$(jq -r .napi .sia-sdk-rs.json)" >> "$GITHUB_OUTPUT"

      - name: Clone Rust SDK
        run: git clone --branch "${{ steps.sdk.outputs.ref }}" --single-branch --depth 1 https://github.com/SiaFoundation/sia-sdk-rs.git rust/sia-sdk-rs

      - name: Cache Rust target + registry
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: rust/sia-sdk-rs
          shared-key: napi-${{ matrix.suffix }}

      - name: Build NAPI binary
        working-directory: rust/sia-sdk-rs/sia_storage_napi
        env:
          # ring's ARM assembly needs __ARM_ARCH defined for napi-cross's GCC.
          CFLAGS_aarch64_unknown_linux_gnu: -march=armv8-a -D__ARM_ARCH=8
        run: bunx @napi-rs/cli build --release --platform --dts index.d.ts --target ${{ matrix.target }} ${{ matrix.flags }}

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: napi-${{ matrix.suffix }}
          path: |
            rust/sia-sdk-rs/sia_storage_napi/sia-storage.*.node
            rust/sia-sdk-rs/sia_storage_napi/index.d.ts

  build-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Read sia-sdk-rs wasm version
        id: sdk
        shell: bash
        # Independent of build-napi: see that job's comment and
        # check-sdk-update.yml header for the same-commit assumption.
        run: echo "ref=$(jq -r .wasm .sia-sdk-rs.json)" >> "$GITHUB_OUTPUT"

      - name: Clone Rust SDK
        run: git clone --branch "${{ steps.sdk.outputs.ref }}" --single-branch --depth 1 https://github.com/SiaFoundation/sia-sdk-rs.git rust/sia-sdk-rs

      - name: Cache Rust target + registry
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: rust/sia-sdk-rs
          shared-key: wasm

      - run: bun run build-wasm

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: wasm
          path: wasm/sia_storage_wasm*

  test:
    needs: [build-napi, build-wasm]
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: wasm
          path: wasm/

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: napi-darwin-arm64
          path: artifacts/napi-darwin-arm64/

      - name: Stage NAPI binary + types
        run: |
          mkdir -p node_modules/@siafoundation/sia-storage-darwin-arm64
          cp artifacts/napi-darwin-arm64/sia-storage.darwin-arm64.node node_modules/@siafoundation/sia-storage-darwin-arm64/sia-storage.node
          echo '{"name":"@siafoundation/sia-storage-darwin-arm64","main":"sia-storage.node"}' > node_modules/@siafoundation/sia-storage-darwin-arm64/package.json
          cp artifacts/napi-darwin-arm64/index.d.ts src/node/napi.generated.d.ts

      - name: Cache bun install
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Cache npm registry (fixture installs)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: npm-${{ runner.os }}-

      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/Library/Caches/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: playwright-${{ runner.os }}-

      - run: bun install && bun run build

      # --with-deps is a Linux-only apt step; on the macOS runner it hangs
      # after the browser download. The macOS browser bundle is self-contained.
      - run: bunx playwright install chromium
        timeout-minutes: 5

      - run: bun run test:all

  publish:
    needs: [build-napi, build-wasm, test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: wasm
          path: wasm/

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: artifacts/

      - name: Stage NAPI types for build
        run: cp artifacts/napi-darwin-arm64/index.d.ts src/node/napi.generated.d.ts

      - run: bun install && bun run build

      - name: Publish to npm
        run: bun run scripts/publish.ts --ci
