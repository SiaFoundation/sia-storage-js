name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: aarch64-apple-darwin, wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Read sia-sdk-rs version
        id: sdk
        shell: bash
        # CI clones once at the napi tag and builds BOTH napi and wasm from
        # this single clone. Relies on the upstream invariant that napi and
        # wasm release tags share a commit (see check-sdk-update.yml header
        # for the failure mode if that ever changes).
        run: echo "ref=$(jq -r .napi .sia-sdk-rs.json)" >> "$GITHUB_OUTPUT"

      - name: Clone Rust SDK
        run: git clone --branch "${{ steps.sdk.outputs.ref }}" --single-branch --depth 1 https://github.com/SiaFoundation/sia-sdk-rs.git rust/sia-sdk-rs

      - name: Cache Rust target + registry
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: rust/sia-sdk-rs
          shared-key: napi-darwin-arm64

      - name: Cache bun install
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Cache npm registry (fixture installs)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: npm-${{ runner.os }}-

      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/Library/Caches/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Build NAPI binary
        working-directory: rust/sia-sdk-rs/sia_storage_napi
        run: bunx @napi-rs/cli build --release --platform --dts index.d.ts --target aarch64-apple-darwin

      - name: Stage NAPI binary + types
        run: |
          mkdir -p node_modules/@siafoundation/sia-storage-darwin-arm64
          cp rust/sia-sdk-rs/sia_storage_napi/sia-storage.darwin-arm64.node node_modules/@siafoundation/sia-storage-darwin-arm64/sia-storage.node
          echo '{"name":"@siafoundation/sia-storage-darwin-arm64","main":"sia-storage.node"}' > node_modules/@siafoundation/sia-storage-darwin-arm64/package.json
          cp rust/sia-sdk-rs/sia_storage_napi/index.d.ts src/node/napi.generated.d.ts

      - name: Build WASM
        run: bun run build-wasm

      - run: bun install && bun run build

      # No --with-deps: it's Linux-only (apt); the macOS bundle is self-contained.
      - run: bunx playwright install chromium
        timeout-minutes: 5

      - run: bun run test:all
