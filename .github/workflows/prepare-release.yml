name: Prepare Release

on:
  push:
    branches: [main]

jobs:
  prepare-release:
    if: "!contains(github.event.head_commit.message, 'chore: release')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0
          # RELEASE_PAT (a real user), not GITHUB_TOKEN: knope's push to the
          # release branch and the PR it opens must be attributed to a user so
          # the release PR's CI runs. GITHUB_TOKEN-authored events don't trigger
          # workflows, so that PR's "test" check would sit in action_required
          # awaiting a manual "Approve and run" before it could merge.
          token: ${{ secrets.RELEASE_PAT }}

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - uses: knope-dev/action@19617851f9f13ab2f27a05989c55efb18aca3675 # v2.1.2
        with:
          version: 0.22.2

      - run: knope prepare-release --verbose
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}
        continue-on-error: true
